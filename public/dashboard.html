<script>

    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-dim": "#051424", "surface": "#051424", "on-surface": "#d4e4fa",
          "on-surface-variant": "#c7c4d7", "outline-variant": "#464554",
          "primary": "#c0c1ff", "primary-container": "#8083ff", "error": "#ffb4ab",
          "secondary": "#bec6e0", "tertiary": "#bcc7de"
        },
        fontFamily: { 
          'body-lg': ['Hanken Grotesk'], 'headline-md': ['Hanken Grotesk'],
          'code-sm': ['JetBrains Mono', 'monospace'], 'display-lg': ['Hanken Grotesk'],
          'label-caps': ['JetBrains Mono'], 'body-md': ['Hanken Grotesk'], 'headline-lg': ['Hanken Grotesk']
        },
        fontSize: {
          'body-lg': ['18px', { lineHeight: '28px', fontWeight: '400' }],
          'headline-md': ['24px', { lineHeight: '32px', fontWeight: '600' }],
          'code-sm': ['14px', { lineHeight: '20px', fontWeight: '500' }],
          'display-lg': ['48px', { lineHeight: '56px', letterSpacing: '-0.02em', fontWeight: '700' }],
          'label-caps': ['12px', { lineHeight: '16px', letterSpacing: '0.05em', fontWeight: '700' }],
          'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
          'headline-lg': ['32px', { lineHeight: '40px', fontWeight: '600' }]

      }
    }
  }
</script>

    font-weight: 700;

  }

<!-- Main Content -->
<main class="pt-24 pb-12 px-4 md:px-6 min-h-screen">

    <!-- Header with New Scan Button -->

<script>
let currentReport = null;
let severityChart = null;

// Copy to clipboard function
async function copyToClipboard(text, buttonElement) {
  try {
    await navigator.clipboard.writeText(text);
    
    // Show success animation on button
    const originalContent = buttonElement.innerHTML;
    buttonElement.innerHTML = '<span class="material-symbols-outlined text-[16px]">check</span> Copied!';
    buttonElement.classList.add('copied');
    
    // Reset after 2 seconds
    setTimeout(() => {
      buttonElement.innerHTML = originalContent;
      buttonElement.classList.remove('copied');
    }, 2000);
    
    // Also show a small toast notification
    showToast('Command copied to clipboard!');
  } catch (err) {
    console.error('Failed to copy:', err);
    // Fallback for older browsers
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showToast('Command copied to clipboard!');
  }
}

// Toast notification function
function showToast(message) {
  // Create toast element if it doesn't exist
  let toast = document.getElementById('toast-notification');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast-notification';
    toast.className = 'fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-primary text-on-primary px-4 py-2 rounded-lg shadow-lg z-50 transition-all duration-300 opacity-0 translate-y-4';
    toast.style.minWidth = '200px';
    toast.style.textAlign = 'center';
    document.body.appendChild(toast);
  }
  
  toast.textContent = message;
  toast.classList.remove('opacity-0', 'translate-y-4');
  toast.classList.add('opacity-100', 'translate-y-0');
  
  setTimeout(() => {
    toast.classList.remove('opacity-100', 'translate-y-0');
    toast.classList.add('opacity-0', 'translate-y-4');
  }, 2000);
}

// Modal functions
function openFixModal(content) {
  document.getElementById('fixModalContent').innerHTML = content;
  document.getElementById('fixModal').classList.add('active');
}

function closeFixModal() {
  document.getElementById('fixModal').classList.remove('active');
}

// Close modal with Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeFixModal();
  }
});

// Close modal when clicking outside
document.getElementById('fixModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('fixModal')) {
    closeFixModal();
  }
});

async function loadDashboard() {
  // Check URL for scan ID parameter
  const urlParams = new URLSearchParams(window.location.search);
  const scanId = urlParams.get('scan');
  
  let reportData = null;
  
  if (scanId) {
    // Fetch specific scan from history
    try {
      const response = await fetch(`/api/scan/${scanId}`);
      const scan = await response.json();
      if (scan && scan.fullReport) {
        reportData = {
          fullReport: scan.fullReport,
          aiReport: scan.aiSummary,
          summary: scan.summary
        };
      }
    } catch (err) {
      console.error('Failed to load scan:', err);
    }
  }
  
  // If no specific scan, try localStorage
  if (!reportData) {
    const lastScan = localStorage.getItem('lastScan');
    if (lastScan) {
      reportData = JSON.parse(lastScan);
    }
  }
  
  if (!reportData || !reportData.fullReport) {
    document.getElementById('dashboard-content').innerHTML = `
      <div class="glass-panel rounded-xl p-12 text-center">
        <span class="material-symbols-outlined text-6xl text-on-surface-variant mb-4">analytics</span>
        <h3 class="font-headline-md text-headline-md mb-2">No Scan Data Available</h3>
        <p class="text-on-surface-variant mb-6">Run a scan to see detailed security insights and vulnerability analysis.</p>
        <a href="/scan" class="inline-block bg-primary text-on-primary px-6 py-3 rounded-lg font-semibold hover:brightness-110 transition-all">Start a Scan →</a>
      </div>
    `;
    return;
  }
  
  currentReport = reportData;
  renderDashboard(reportData);
}

function renderDashboard(reportData) {
  const report = reportData.fullReport;
  const severity = report.severityBreakdown || { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0 };
  const vulnerable = report.results.filter(p => p.status === 'Vulnerable');
  const cleanPackages = report.results.filter(p => p.status === 'Clean');
  const totalVulns = Object.values(severity).reduce((a, b) => a + b, 0);
  
  // Prepare chart data
  const chartData = {
    critical: severity.CRITICAL || 0,
    high: severity.HIGH || 0,
    medium: severity.MEDIUM || 0,
    low: severity.LOW || 0
  };
  
  const dashboardHtml = `
    <!-- Stats Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
      <div class="glass-panel rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-primary">${report.packagesScanned}</div>
        <div class="text-sm text-on-surface-variant">Total Packages</div>
      </div>
      <div class="glass-panel rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-error">${totalVulns}</div>
        <div class="text-sm text-on-surface-variant">Vulnerabilities</div>
      </div>
      <div class="glass-panel rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-orange-400">${severity.CRITICAL || 0}</div>
        <div class="text-sm text-on-surface-variant">Critical</div>
      </div>
      <div class="glass-panel rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-yellow-400">${severity.HIGH || 0}</div>
        <div class="text-sm text-on-surface-variant">High</div>
      </div>
      <div class="glass-panel rounded-xl p-4 text-center">
        <div class="text-3xl font-bold text-green-400">${cleanPackages.length}</div>
        <div class="text-sm text-on-surface-variant">Clean Packages</div>
      </div>
    </div>
    
    <!-- Charts and AI Row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Severity Chart -->
      <div class="glass-panel rounded-xl p-6">
        <h3 class="font-headline-md text-headline-md mb-4 flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">donut_large</span>
          Severity Distribution
        </h3>
        <div class="relative flex items-center justify-center" style="height: 250px;">
          <canvas id="severityChart"></canvas>
        </div>
        <div class="flex justify-center gap-4 mt-4 flex-wrap">
          <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-error"></div><span class="text-xs">Critical</span></div>
          <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-orange-400"></div><span class="text-xs">High</span></div>
          <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-yellow-400"></div><span class="text-xs">Medium</span></div>
          <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-green-400"></div><span class="text-xs">Low</span></div>
        </div>
      </div>
      
      <!-- AI Remediation Card -->
      <div class="glass-panel rounded-xl p-6">
        <div class="flex items-center gap-2 mb-4">
          <span class="material-symbols-outlined text-primary">auto_awesome</span>
          <h3 class="font-headline-md text-headline-md">AI Remediation Insights</h3>
        </div>
        <div class="bg-primary/5 rounded-lg p-4 border border-primary/20 max-h-[200px] overflow-y-auto markdown-content">
          ${renderMarkdown(reportData.aiReport || 'No AI analysis available for this scan. Run a new scan to get AI-powered insights.')}
        </div>
        ${vulnerable.length > 0 ? `
          <button onclick="showFixSuggestions()" class="w-full mt-4 py-2 bg-primary-container text-on-primary-container font-bold rounded-lg text-sm flex items-center justify-center gap-2 hover:brightness-110 transition-all">
            <span class="material-symbols-outlined text-[16px]">bolt</span>
            Apply Safe Fixes
          </button>
        ` : ''}
      </div>
    </div>
    
    <!-- Top Vulnerable Packages -->
    <div class="glass-panel rounded-xl overflow-hidden">
      <div class="p-5 border-b border-outline-variant/20 flex items-center justify-between flex-wrap gap-3">
        <h3 class="font-headline-md text-headline-md flex items-center gap-2">
          <span class="material-symbols-outlined text-error">warning</span>
          Top Vulnerable Packages
        </h3>
        <div class="flex gap-2">
          <button onclick="exportReport('json')" class="px-3 py-1.5 rounded-lg border border-outline-variant text-on-surface-variant text-xs flex items-center gap-1 hover:bg-white/5 transition-all">
            <span class="material-symbols-outlined text-[16px]">download</span> JSON
          </button>
          <button onclick="exportReport('csv')" class="px-3 py-1.5 rounded-lg border border-outline-variant text-on-surface-variant text-xs flex items-center gap-1 hover:bg-white/5 transition-all">
            <span class="material-symbols-outlined text-[16px]">table_chart</span> CSV
          </button>
        </div>
      </div>
      <div class="scrollable-table">
        <table class="w-full text-left">
          <thead class="bg-surface-container-high sticky top-0">
            <tr class="text-on-surface-variant text-sm border-b border-outline-variant/20">
              <th class="px-5 py-3 font-semibold">Package</th>
              <th class="px-5 py-3 font-semibold">Version</th>
              <th class="px-5 py-3 font-semibold">Vulnerabilities</th>
              <th class="px-5 py-3 font-semibold">Severities</th>
              <th class="px-5 py-3 font-semibold text-center">Action</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-outline-variant/10">
            ${vulnerable.length === 0 ? `
              <tr><td colspan="5" class="px-5 py-8 text-center text-on-surface-variant">No vulnerable packages found! 🎉</td></tr>
            ` : vulnerable.slice(0, 20).map(pkg => {
              const severities = pkg.vulnerabilities.map(v => v.severity);
              const hasCritical = severities.includes('CRITICAL');
              const hasHigh = severities.includes('HIGH');
              const hasMedium = severities.includes('MEDIUM');
              
              return `
                <tr class="hover:bg-surface-container-high transition-colors">
                  <td class="px-5 py-3 font-code-sm text-primary">${escapeHtml(pkg.package)}</td>
                  <td class="px-5 py-3 text-on-surface-variant font-code-sm">${escapeHtml(pkg.version)}</td>
                  <td class="px-5 py-3"><span class="text-error font-bold">${pkg.vulnerabilities.length}</span></td>
                  <td class="px-5 py-3">
                    <div class="flex gap-1 flex-wrap">
                      ${hasCritical ? '<span class="px-2 py-0.5 rounded text-[10px] font-bold status-critical">CRITICAL</span>' : ''}
                      ${hasHigh ? '<span class="px-2 py-0.5 rounded text-[10px] font-bold status-high">HIGH</span>' : ''}
                      ${hasMedium ? '<span class="px-2 py-0.5 rounded text-[10px] font-bold status-medium">MEDIUM</span>' : ''}
                    </div>
                  </td>
                  <td class="px-5 py-3 text-center">
                    <button onclick="showPackageFixes('${escapeHtml(pkg.package)}', '${escapeHtml(pkg.version)}', ${JSON.stringify(pkg.vulnerabilities).replace(/"/g, '&quot;')})" class="bg-primary/10 border border-primary/30 text-primary px-3 py-1 rounded-lg text-[11px] hover:bg-primary hover:text-on-primary transition-all">
                      💡 Fix
                    </button>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
      ${vulnerable.length > 20 ? `
        <div class="p-4 bg-surface-container-low text-center border-t border-outline-variant/20">
          <p class="text-sm text-on-surface-variant">Showing 20 of ${vulnerable.length} vulnerable packages</p>
        </div>
      ` : ''}
    </div>
  `;
  
  document.getElementById('dashboard-content').innerHTML = dashboardHtml;
  
  // Create the chart after the HTML is rendered
  setTimeout(() => {
    const ctx = document.getElementById('severityChart')?.getContext('2d');
    if (ctx && severityChart) severityChart.destroy();
    if (ctx) {
      severityChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Critical', 'High', 'Medium', 'Low'],
          datasets: [{
            data: [chartData.critical, chartData.high, chartData.medium, chartData.low],
            backgroundColor: ['#ffb4ab', '#ffccbc', '#fff59d', '#22c55e'],
            borderWidth: 0,
            hoverOffset: 10
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: (context) => `${context.label}: ${context.raw} vulnerabilities` } }
          }
        }
      });
    }
  }, 100);
}

function renderMarkdown(text) {
  if (!text) return '<p class="text-on-surface-variant">No content available</p>';
  try {
    marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
    return marked.parse(text);
  } catch (e) {
    return `<pre class="whitespace-pre-wrap">${escapeHtml(text)}</pre>`;
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

async function exportReport(format) {
  if (!currentReport) {
    showSimpleDialog('Export Failed', 'No report available to export.');
    return;
  }
  
  try {
    const response = await fetch('/api/export-report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ report: currentReport.fullReport, format: format })
    });
    
    if (!response.ok) throw new Error('Export failed');
    
    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const extension = format === 'markdown' ? 'md' : format;
    a.download = `vulnerability-report.${extension}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    window.URL.revokeObjectURL(url);
  } catch (err) {
    showSimpleDialog('Export Failed', err.message);
  }
}

function showFixSuggestions() {
  if (!currentReport) return;
  const vulnerable = currentReport.fullReport.results.filter(p => p.status === 'Vulnerable');
  if (vulnerable.length === 0) {
    showSimpleDialog('No Vulnerabilities', 'No vulnerable packages to fix! All dependencies are clean.');
    return;
  }
  
  let modalContent = `
    <div class="space-y-4">
      <p class="text-on-surface-variant">The following vulnerabilities were detected. Here are recommended fixes:</p>
      <div class="space-y-3">
  `;
  
  vulnerable.slice(0, 15).forEach(pkg => {
    const fixCommand = `npm install ${pkg.package}@latest`;
    modalContent += `
      <div class="bg-surface-container-low rounded-lg p-3 border border-outline-variant/20">
        <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
          <span class="font-code-sm text-primary font-bold">${escapeHtml(pkg.package)}@${escapeHtml(pkg.version)}</span>
          <span class="text-xs text-error">${pkg.vulnerabilities.length} vulnerability(s)</span>
        </div>
        <div class="space-y-1 mb-2">
          ${pkg.vulnerabilities.map(v => `<div class="text-xs text-on-surface-variant">• ${v.id} (${v.severity})</div>`).join('')}
        </div>
        <div class="flex items-center gap-2">
          <div class="flex-1 code-block text-xs">
            ${fixCommand}
          </div>
          <button onclick="copyToClipboard('${fixCommand}', this)" class="copy-btn px-3 py-2 rounded-lg border border-primary/30 text-primary hover:bg-primary/10 transition-all flex items-center gap-1">
            <span class="material-symbols-outlined text-[16px]">content_copy</span>
            Copy
          </button>
        </div>
      </div>
    `;
  });
  
  if (vulnerable.length > 15) {
    modalContent += `<p class="text-center text-on-surface-variant text-sm">...and ${vulnerable.length - 15} more packages</p>`;
  }
  
  modalContent += `
      </div>
      <div class="bg-primary/10 rounded-lg p-3 border border-primary/20 mt-2">
        <p class="text-sm"><span class="font-bold">💡 Pro Tip:</span> You can also run <code class="bg-surface-dim px-1 rounded">npm audit fix</code> to attempt automatic fixes.</p>
      </div>
    </div>
  `;
  
  openFixModal(modalContent);
}

      <span class="material-symbols-outlined text-4xl text-primary">info</span>
      <h4 class="font-headline-md text-headline-md">${escapeHtml(title)}</h4>
      <p class="text-on-surface-variant">${escapeHtml(message)}</p>
    </div>
  `;
  openFixModal(modalContent);
}
